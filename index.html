  <!-- 초기 모바일 판별 / 입력 엔터 동작 -->
<script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && (navigator.maxTouchPoints || 0) > 1);

      if (isIOS) {
        document.documentElement.classList.add('ios-view');
      }
      var isPhoneUA = /iPhone|iPod|Android.*Mobile|Mobile Safari/i.test(ua);
      var isTouch = (navigator.maxTouchPoints || 0) > 0;
      var coarse = false;

      try {
        coarse = window.matchMedia('(hover: none), (pointer: coarse)').matches;
      } catch (e) {}

      if (isPhoneUA || (isTouch && coarse)) {
        document.documentElement.classList.add('mobile-device-view');
      }
    })();

    // 모바일 입력창 포커스 시 iOS Safari 자동 확대 방지 + 엔터 동작 보정
    function initMobileInputKeyboardBehavior() {
      const titleInput = document.getElementById('titleSearchInput');

      if (titleInput) {
        titleInput.setAttribute('enterkeyhint', 'done');
        titleInput.addEventListener('keydown', event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            titleInput.blur();
          }
        });
      }

      const editForm = document.getElementById('editForm');

      if (editForm) {
        editForm.querySelectorAll('input, select, textarea').forEach(field => {
          if (field.id === 'editTagSearchInput') {
            field.setAttribute('enterkeyhint', 'enter');
            return;
          }

          if (field.tagName === 'TEXTAREA') {
            field.setAttribute('enterkeyhint', 'enter');
            return;
          }

          field.setAttribute('enterkeyhint', 'next');
        });

        editForm.addEventListener('keydown', event => {
          if (event.key !== 'Enter') return;

          const target = event.target;

          if (!target) return;

          if (target.id === 'editTagSearchInput') {
            return;
          }

          if (target.tagName === 'TEXTAREA') {
            return;
          }

          if (!target.matches('input.edit-input, select.edit-select')) {
            return;
          }

          event.preventDefault();
          focusNextEditField(target);
        });
      }
    }

    function focusNextEditField(currentField) {
      const editForm = document.getElementById('editForm');

      if (!editForm) return;

      const fields = Array.from(
        editForm.querySelectorAll('input.edit-input, select.edit-select, textarea.edit-textarea')
      ).filter(field => {
        if (field.id === 'editTagSearchInput') return false;
        if (field.disabled) return false;
        if (field.offsetParent === null) return false;
        return true;
      });

      const currentIndex = fields.indexOf(currentField);

      if (currentIndex < 0) return;

      const nextField = fields[currentIndex + 1];

      if (nextField) {
        nextField.focus({ preventScroll: false });

        if (typeof nextField.select === 'function' && nextField.tagName !== 'TEXTAREA') {
          nextField.select();
        }
      } else {
        currentField.blur();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMobileInputKeyboardBehavior);
    } else {
      initMobileInputKeyboardBehavior();
    }


    function preventTitleSearchFocusZoom() {
      const input = document.getElementById('titleSearchInput');
      const viewport = document.querySelector('meta[name="viewport"]');

      if (!input) return;

      const fixedViewport = 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';

      function fixZoom() {
        if (viewport) {
          viewport.setAttribute('content', fixedViewport);
        }

        input.style.fontSize = '40px';
        input.style.transform = 'none';
        input.style.webkitTransform = 'none';
        input.style.zoom = '1';
      }

      input.addEventListener('touchstart', fixZoom, { passive: true });
      input.addEventListener('focus', fixZoom);
      input.addEventListener('focusin', fixZoom);
    }


    function preventFilterTagSearchFocusZoom() {
      const input = document.getElementById('tagSearchInput');
      const viewport = document.querySelector('meta[name="viewport"]');

      if (!input) return;

      const fixedViewport = 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';

      function fixZoom() {
        if (viewport) {
          viewport.setAttribute('content', fixedViewport);
        }

        input.style.setProperty('font-size', '38px', 'important');
        input.style.setProperty('transform', 'translateZ(0) scale(1)', 'important');
        input.style.setProperty('-webkit-transform', 'translateZ(0) scale(1)', 'important');
        input.style.setProperty('zoom', '1', 'important');
        input.style.setProperty('-webkit-text-size-adjust', '100%', 'important');
        input.style.setProperty('text-size-adjust', '100%', 'important');
      }

      input.addEventListener('touchstart', fixZoom, { passive: true });
      input.addEventListener('pointerdown', fixZoom, { passive: true });
      input.addEventListener('focus', fixZoom);
      input.addEventListener('focusin', fixZoom);
    }

  </script>

  <!-- 앱 로직 -->
<script>
    let works = [];
    let currentList = [];
    let selectedIndex = null;
    const MOBILE_PAGE_SIZE = 50;
    let mobileVisibleCount = MOBILE_PAGE_SIZE;
    let lastMobileListStateKey = '';
    let favoriteOnly = false;
    let listViewMode = 'list';
    let editingIndex = null;
    let editMode = 'edit';

    let editFavoriteValue = false;
    let editSelectedRating = 0;
    let editSelectedTags = [];
    let editCategoryValue = '웹툰';
    let editGradeValue = '전체연령';
    let editUnitValue = '화';
    let editActiveSuggestionIndex = -1;

    let allTags = [];
    let allCategories = [];
    let allGrades = [];
    let allStatuses = [];

    let selectedTags = [];
    let selectedCategory = '';
    let selectedGrade = '';
    let selectedStatus = '';
    let selectedReadStatus = '';

    let activeSuggestionIndex = -1;

    const MOBILE_BREAKPOINT = 1100;
    const mobileQuery = window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`);

    /*
      GitHub Pages용 Apps Script API 주소
      1) Apps Script에서 Code.gs를 API용 코드로 교체
      2) 배포 > 배포 관리 > 새 버전 배포
      3) 아래 URL을 본인 웹 앱 URL(/exec)로 바꾸기
    */
    const API_URL = 'https://script.google.com/macros/s/AKfycbyxfFD6-3J1BZ-mCTn7rbQqXVt0gSN4hm7ec9LJw2SfzvM3kBAoIl2wzbOQ83MZ4417aA/exec';

    function normalizeApiUrl_() {
      const url = String(API_URL || '').trim();

      if (!url || url === 'https://script.google.com/macros/s/AKfycbyxfFD6-3J1BZ-mCTn7rbQqXVt0gSN4hm7ec9LJw2SfzvM3kBAoIl2wzbOQ83MZ4417aA/exec') {
        throw new Error('index.html의 API_URL에 Apps Script 웹 앱 URL을 넣어주세요.');
      }

      return url;
    }

    function apiJsonp(action, params = {}) {
      return new Promise((resolve, reject) => {
        let script = null;
        const callbackName = `__worksApiCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;

        const cleanup = () => {
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        };

        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error('API 응답 시간이 초과되었습니다.'));
        }, 20000);

        window[callbackName] = response => {
          window.clearTimeout(timer);
          cleanup();

          if (!response || response.success !== true) {
            reject(new Error(response && response.error ? response.error : 'API 응답 오류'));
            return;
          }

          resolve(response.data);
        };

        try {
          const url = new URL(normalizeApiUrl_());
          url.searchParams.set('action', action);
          url.searchParams.set('callback', callbackName);
          url.searchParams.set('_', Date.now());

          Object.keys(params || {}).forEach(key => {
            const value = params[key];

            if (value !== undefined && value !== null) {
              url.searchParams.set(key, String(value));
            }
          });

          script = document.createElement('script');
          script.async = true;
          script.src = url.toString();
          script.onerror = () => {
            window.clearTimeout(timer);
            cleanup();
            reject(new Error('Apps Script API에 연결하지 못했습니다.'));
          };

          document.body.appendChild(script);
        } catch (error) {
          window.clearTimeout(timer);
          cleanup();
          reject(error);
        }
      });
    }

    async function apiPost(action, payload = {}) {
      const body = JSON.stringify({
        action,
        ...payload
      });

      await fetch(normalizeApiUrl_(), {
        method: 'POST',
        mode: 'no-cors',
        body
      });

      // Apps Script 반영 직후 바로 다시 읽으면 이전 캐시를 볼 수 있어 짧게 대기
      await new Promise(resolve => window.setTimeout(resolve, 700));
    }

    function showLoadError(error) {
      console.log(error);

      const message =
        error && error.message
          ? error.message
          : JSON.stringify(error);

      document.getElementById('countText').textContent = '데이터 불러오기 실패';

      document.getElementById('listArea').innerHTML = `
        <div class="empty">
          데이터를 불러오지 못했습니다.<br>
          <br>
          오류 내용:<br>
          ${escapeHtml(message)}
        </div>
      `;
    }

    async function loadWorksFromServer(options = {}) {
      const keepSelectedRowNumber =
        options.keepSelectedRowNumber ||
        (
          selectedIndex !== null &&
          works[selectedIndex]
            ? works[selectedIndex].rowNumber
            : null
        );

      try {
        const data = await apiJsonp('getWorks');
        works = Array.isArray(data) ? data : [];

        if (keepSelectedRowNumber) {
          const nextIndex = works.findIndex(item => String(item.rowNumber) === String(keepSelectedRowNumber));
          selectedIndex = nextIndex >= 0 ? nextIndex : null;
        }

        refreshFilterSources();
        drawFilterOptions();
        renderWorks();

        if (!isMobileView() && selectedIndex !== null && works[selectedIndex]) {
          drawDetail(works[selectedIndex]);
        }

        return works;
      } catch (error) {
        showLoadError(error);
        throw error;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      lockIOSAutoZoom();
      preventTitleSearchFocusZoom();
      preventFilterTagSearchFocusZoom();
      applyResponsiveMode();
      loadWorksFromServer();
    });

    mobileQuery.addEventListener('change', () => {
      applyResponsiveMode();
      hideMobileModal();
      closeFilterPanel();
      renderWorks();
    });

    document.addEventListener('click', event => {
      const tagWrap = document.querySelector('.tag-search-wrap');
      const editTagWrap = document.querySelector('.edit-tag-input-box');
      const popover = document.getElementById('filterPopover');
      const filterBtn = document.getElementById('filterBtn');

      if (tagWrap && !tagWrap.contains(event.target)) {
        hideTagSuggestions();
      }

      if (editTagWrap && !editTagWrap.contains(event.target)) {
        hideEditTagSuggestions();
      }

      if (
        popover &&
        filterBtn &&
        !popover.contains(event.target) &&
        !filterBtn.contains(event.target)
      ) {
        closeFilterPanel();
      }
    });

    window.addEventListener('resize', () => {
      applyResponsiveMode();
      handleResizeAfterLayoutChange();
    });

    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        applyResponsiveMode();
        handleResizeAfterLayoutChange();
      }, 250);
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        applyResponsiveMode();
        handleResizeAfterLayoutChange();
      });
    }

    function getViewportWidth() {
      return Math.min(
        window.innerWidth || 9999,
        document.documentElement.clientWidth || 9999,
        window.visualViewport ? window.visualViewport.width : 9999
      );
    }

    function getViewportHeight() {
      return Math.min(
        window.innerHeight || 9999,
        document.documentElement.clientHeight || 9999,
        window.visualViewport ? window.visualViewport.height : 9999
      );
    }

    function isRealPhone() {
      const ua = navigator.userAgent || '';
      const isPhoneUA = /iPhone|iPod|Android.*Mobile|Mobile Safari/i.test(ua);
      const isTouch = (navigator.maxTouchPoints || 0) > 0;
      const coarsePointer = window.matchMedia('(hover: none), (pointer: coarse)').matches;

      // 실제 아이폰/안드로이드에서는 구글 Apps Script 미리보기/사파리 주소창 때문에
      // viewport 폭이 애매하게 잡혀도 무조건 터치형 UI를 적용합니다.
      return isPhoneUA || (isTouch && coarsePointer);
    }

    function isMobileView() {
      return getViewportWidth() <= MOBILE_BREAKPOINT || isRealPhone();
    }

    function applyResponsiveMode() {
      const width = getViewportWidth();
      const height = getViewportHeight();
      const realPhone = isRealPhone();
      const mobile = width <= MOBILE_BREAKPOINT || realPhone;

      document.documentElement.style.setProperty('--app-height', `${height}px`);
      document.body.classList.toggle('mobile-view', mobile);
      document.body.classList.toggle('real-phone-view', realPhone);
      document.documentElement.classList.toggle('mobile-device-view', realPhone);
      document.body.classList.toggle('pc-view', !mobile);
      document.documentElement.classList.toggle('ios-view', isIOSDevice());
    }

    function isIOSDevice() {
      const ua = navigator.userAgent || '';
      return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && (navigator.maxTouchPoints || 0) > 1);
    }

    function lockIOSAutoZoom() {
      if (!isIOSDevice()) return;

      const viewport = document.querySelector('meta[name="viewport"]');

      if (viewport) {
        viewport.setAttribute(
          'content',
          'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
        );
      }

      document.addEventListener('gesturestart', event => event.preventDefault(), { passive: false });
      document.addEventListener('gesturechange', event => event.preventDefault(), { passive: false });
      document.addEventListener('gestureend', event => event.preventDefault(), { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', event => {
        const now = Date.now();

        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }

        lastTouchEnd = now;
      }, { passive: false });

      document.addEventListener('focusin', event => {
        if (event.target && event.target.matches('input, select, textarea')) {
          document.body.classList.add('ios-focus-lock');

          if (viewport) {
            viewport.setAttribute(
              'content',
              'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
            );
          }
        }
      });

      document.addEventListener('focusout', () => {
        document.body.classList.remove('ios-focus-lock');

        if (viewport) {
          viewport.setAttribute(
            'content',
            'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
          );
        }
      });
    }

    function handleResizeAfterLayoutChange() {
      const popover = document.getElementById('filterPopover');
      const button = document.getElementById('filterBtn');

      if (popover && button && popover.classList.contains('open')) {
        positionFilterPanel(button, popover);
      }

      if (!isMobileView()) {
        hideMobileModal();

        if (selectedIndex !== null && currentList[selectedIndex]) {
          drawDetail(currentList[selectedIndex]);
        }
      }

      markImageCardTagOverflow();
    }

    function refreshFilterSources() {
      allTags = collectAllTags(works);
      allCategories = collectUniqueValues(works, 'category');
      allGrades = collectUniqueValues(works, 'grade');

      allStatuses = collectUniqueValues(works, 'status')
        .filter(status => !['연재중단', '휴재'].includes(String(status).trim()));
    }

    function normalizeSearchText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/\s+/g, '');
    }

    function handleTitleSearchInput() {
      const input = document.getElementById('titleSearchInput');
      const clearBtn = document.getElementById('searchClearBtn');

      if (input.value.trim()) {
        clearBtn.classList.add('show');
      } else {
        clearBtn.classList.remove('show');
      }

      renderWorks();
    }

    function clearTitleSearch() {
      const input = document.getElementById('titleSearchInput');
      const clearBtn = document.getElementById('searchClearBtn');

      input.value = '';
      clearBtn.classList.remove('show');

      renderWorks();
      input.focus();
    }

    function renderWorks() {
      const titleSearch = normalizeSearchText(document.getElementById('titleSearchInput').value);
      const sort = document.getElementById('sortSelect').value;

      let filtered = works.filter(item => {
        const titleTarget = normalizeSearchText(item.title);
        const itemTags = splitTags(item.tags).map(tag => tag.toLowerCase());

        const matchTitle = !titleSearch || titleTarget.includes(titleSearch);
        const matchFavorite = !favoriteOnly || item.favorite;

        const matchCategory = !selectedCategory || String(item.category) === String(selectedCategory);
        const matchGrade = !selectedGrade || String(item.grade) === String(selectedGrade);
        const matchStatus = !selectedStatus || String(item.status) === String(selectedStatus);
        const matchReadStatus = !selectedReadStatus || getReadStatus(item) === selectedReadStatus;

        const matchTags =
          selectedTags.length === 0 ||
          selectedTags.every(selected =>
            itemTags.includes(selected.toLowerCase())
          );

        return (
          matchTitle &&
          matchFavorite &&
          matchCategory &&
          matchGrade &&
          matchStatus &&
          matchReadStatus &&
          matchTags
        );
      });

      filtered.sort((a, b) => {
        if (sort === 'ratingDesc') {
          return Number(b.rating || 0) - Number(a.rating || 0);
        }

        if (sort === 'ratingAsc') {
          return Number(a.rating || 0) - Number(b.rating || 0);
        }

        if (sort === 'createdDesc') {
          return parseDate(b.createdAt) - parseDate(a.createdAt);
        }

        if (sort === 'updatedDesc') {
          return parseDate(b.updatedAt) - parseDate(a.updatedAt);
        }

        if (sort === 'titleAsc') {
          return String(a.title).localeCompare(String(b.title), 'ko');
        }

        return 0;
      });

      const mobileListStateKey = JSON.stringify({
        titleSearch,
        sort,
        favoriteOnly,
        selectedCategory,
        selectedGrade,
        selectedStatus,
        selectedReadStatus,
        selectedTags,
        listViewMode
      });

      if (mobileListStateKey !== lastMobileListStateKey) {
        mobileVisibleCount = MOBILE_PAGE_SIZE;
        lastMobileListStateKey = mobileListStateKey;
      }

      currentList = filtered;

      updateSummary(filtered);
      drawCards(filtered);

      if (!filtered.length) {
        selectedIndex = null;
        drawDetail(null);
        return;
      }

      const selectedStillExists =
        selectedIndex !== null &&
        filtered.some(item => works.indexOf(item) === selectedIndex);

      if (!selectedStillExists) {
        selectedIndex = works.indexOf(filtered[0]);
      }

      if (!isMobileView()) {
        drawDetail(works[selectedIndex]);
      }

      markActiveCard();
    }

    function updateSummary(list) {
      document.getElementById('countText').textContent = `총 ${list.length}개 작품`;
    }

    function drawCards(list) {
      const area = document.getElementById('listArea');

      if (!list.length) {
        area.className = '';
        area.innerHTML = `
          <div class="empty">
            조건에 맞는 작품이 없습니다.
          </div>
        `;
        return;
      }

      area.className = listViewMode === 'image' ? 'grid image-mode' : 'grid';

      const isMobile = isMobileView();
      const visibleList = isMobile ? list.slice(0, mobileVisibleCount) : list;
      const hasMore = isMobile && visibleList.length < list.length;

      area.innerHTML = visibleList.map(item => {
        const index = works.indexOf(item);

        if (listViewMode === 'image') {
          return imageCardHtml(item, index);
        }

        return listCardHtml(item, index);
      }).join('') + (hasMore ? loadMoreCardHtml(list.length, visibleList.length) : '');

      markImageCardTagOverflow();
    }

    function loadMoreCardHtml(totalCount, visibleCount) {
      return `
        <button
          type="button"
          class="card load-more-card"
          onclick="loadMoreWorks()"
        >
          <span class="load-more-title">더보기</span>
          <span class="load-more-count">${visibleCount} / ${totalCount}</span>
        </button>
      `;
    }

    function loadMoreWorks() {
      mobileVisibleCount += MOBILE_PAGE_SIZE;
      renderWorks();
    }

    function markImageCardTagOverflow() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.image-card-tags').forEach(box => {
          const list = box.querySelector('.tag-pill-list');
          if (!list) return;

          box.classList.remove('has-overflow');
          list.querySelectorAll('.tag-more-pill').forEach(el => el.remove());
          const pills = Array.from(list.querySelectorAll('.tag-pill'));

          pills.forEach(pill => {
            pill.hidden = false;
          });

          const maxHeight = box.clientHeight || 116;
          let hasOverflow = false;

          pills.forEach(pill => {
            const bottom = pill.offsetTop + pill.offsetHeight;
            if (bottom > maxHeight + 2) {
              pill.hidden = true;
              hasOverflow = true;
            }
          });

          if (!hasOverflow) return;

          box.classList.add('has-overflow');

          const more = document.createElement('span');
          more.className = 'tag-pill tag-more-pill';
          more.textContent = '+';
          list.appendChild(more);

          while (more.offsetTop + more.offsetHeight > maxHeight + 2) {
            const visiblePills = pills.filter(pill => !pill.hidden);
            const lastVisible = visiblePills[visiblePills.length - 1];

            if (!lastVisible) break;
            lastVisible.hidden = true;
          }
        });
      });
    }

    function listCardHtml(item, index) {
      return `
        <article class="card" data-index="${index}" onclick="selectWork(${index})">
          <div class="card-top">
            ${ratingIconsHtml(item.rating)}

            <div class="card-action-row">
              ${gradeCircleHtml(item.grade)}
              ${progressCircleHtml(item)}
              <button
                type="button"
                class="favorite favorite-toggle ${item.favorite ? 'is-favorite' : ''}"
                onclick="toggleFavoriteItem(event, ${index})"
                title="즐겨찾기 변경"
              >
                ${heartSvg()}
              </button>
            </div>
          </div>

          <div class="title">${escapeHtml(item.title)}</div>

          ${tagPillsHtml(item.tags)}

          ${
            item.review
              ? `<div class="review">${escapeHtml(item.review)}</div>`
              : ''
          }

          <div class="date">
            최근수정일 ${escapeHtml(item.updatedAt || '-')}
          </div>
        </article>
      `;
    }

    function imageCardHtml(item, index) {
      return `
        <article class="card image-card" data-index="${index}" onclick="selectWork(${index})">
          <div class="image-thumb">
            ${
              item.imageUrl
                ? `
                  <img
                    src="${escapeHtml(item.imageUrl)}"
                    alt="${escapeHtml(item.title)}"
                    loading="lazy"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  >
                  <div class="image-thumb-placeholder" style="display:none;">
                    이미지 없음
                  </div>
                `
                : `
                  <div class="image-thumb-placeholder">
                    이미지 없음
                  </div>
                `
            }

            ${gradeCircleHtml(item.grade, 'image-grade')}

            <div class="image-top-actions">
              ${progressCircleHtml(item)}
              <button
                type="button"
                class="favorite favorite-toggle ${item.favorite ? 'is-favorite' : ''}"
                onclick="toggleFavoriteItem(event, ${index})"
                title="즐겨찾기 변경"
              >
                ${heartSvg()}
              </button>
            </div>

            <div class="image-rating-overlay">
              ${ratingIconsHtml(item.rating)}
            </div>
          </div>

          <div class="image-card-title">${escapeHtml(item.title)}</div>

          <div class="image-card-tags">
            ${tagPillsHtml(item.tags)}
          </div>
        </article>
      `;
    }

    function gradeCircleHtml(grade, extraClass = '') {
      const value = String(grade || '').trim();

      if (!value) return '';

      if (value.includes('15')) {
        return `<span class="grade-circle grade-15 ${extraClass}">15</span>`;
      }

      if (value.includes('19')) {
        return `<span class="grade-circle grade-19 ${extraClass}">19</span>`;
      }

      return '';
    }

    function getProgressInfo(item) {
      const status = String(item.status || '').trim();
      const completeStatuses = ['완결', '완결(외전)', '단행본'];
      const total = Number(item.totalCount || 0);
      const watched = Number(item.watchedCount || 0);

      const isCompleteStatus = completeStatuses.includes(status);
      const isFullComplete = isCompleteStatus && total > 0 && watched >= total;

      if (isFullComplete) {
        return {
          percent: 100,
          displayPercent: 100,
          complete: true
        };
      }

      let percent = total > 0 ? Math.round((watched / total) * 100) : 0;

      percent = Math.max(0, Math.min(99, percent));

      if (status === '연재중' && total > 0 && watched >= total) {
        percent = 99;
      }

      let displayPercent = percent;

      if (percent >= 99) {
        displayPercent = 96;
      }

      return {
        percent,
        displayPercent,
        complete: false
      };
    }

    function progressCircleHtml(item) {
      const info = getProgressInfo(item);

      return `
        <span
          class="progress-circle ${info.complete ? 'complete' : ''}"
          style="--progress:${info.displayPercent}%"
          title="${escapeHtml(`${info.percent}%`)}"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12.5l4.2 4.2L19 7"></path>
          </svg>
        </span>
      `;
    }

    function ratingIconsHtml(rating) {
      const value = Number(rating || 0);
      const score = Math.max(0, Math.min(5, Math.round(value)));
      let stars = '';

      for (let i = 1; i <= 5; i++) {
        stars += `<span class="rating-star ${i <= score ? 'filled' : ''}">★</span>`;
      }

      return `<div class="rating-icons" aria-label="별점">${stars}</div>`;
    }

    function tagPillsHtml(tags) {
      const tagList = splitTags(tags);

      if (!tagList.length) {
        return `
          <div class="tag-pill-list">
            <span class="tag-pill">#태그없음</span>
          </div>
        `;
      }

      return `
        <div class="tag-pill-list">
          ${tagList.map(tag => `
            <span class="tag-pill">#${escapeHtml(tag)}</span>
          `).join('')}
        </div>
      `;
    }

    async function toggleFavoriteItem(event, index) {
      event.stopPropagation();

      const item = works[index];

      if (!item) return;

      const nextValue = !item.favorite;
      const targetRowNumber = item.rowNumber;

      try {
        await apiPost('updateFavorite', {
          rowNumber: targetRowNumber,
          favoriteValue: nextValue
        });

        await loadWorksFromServer({
          keepSelectedRowNumber: selectedIndex === index ? targetRowNumber : null
        });

        const updatedIndex = works.findIndex(work => String(work.rowNumber) === String(targetRowNumber));
        const updatedItem = updatedIndex >= 0 ? works[updatedIndex] : null;

        if (!updatedItem) return;

        if (!isMobileView() && selectedIndex === updatedIndex) {
          drawDetail(updatedItem);
        }

        if (isMobileView()) {
          const modalBg = document.getElementById('mobileModalBg');

          if (modalBg.style.display === 'flex' && selectedIndex === updatedIndex) {
            document.getElementById('mobileModalContent').innerHTML = detailHtml(updatedItem);
          }
        }
      } catch (error) {
        const message =
          error && error.message
            ? error.message
            : JSON.stringify(error);

        alert(`즐겨찾기 변경 실패\n${message}`);
      }
    }

    function focusEditTagInput() {
      document.getElementById('editTagSearchInput').focus();
    }

    function handleEditTagInput() {
      const input = document.getElementById('editTagSearchInput');
      const keyword = input.value.trim().toLowerCase();

      editActiveSuggestionIndex = -1;

      if (!keyword) {
        hideEditTagSuggestions();
        return;
      }

      const matchedTags = allTags.filter(tag => {
        const lowerTag = tag.toLowerCase();

        return (
          lowerTag.includes(keyword) &&
          !editSelectedTags.some(selected => selected.toLowerCase() === lowerTag)
        );
      });

      showEditTagSuggestions(matchedTags, input.value.trim());
    }

    function showEditTagSuggestions(tags, keyword) {
      const box = document.getElementById('editTagSuggestions');

      const cleanKeyword = String(keyword || '').trim();
      const exactExists = allTags.some(tag => tag.toLowerCase() === cleanKeyword.toLowerCase());
      const selectedExists = editSelectedTags.some(tag => tag.toLowerCase() === cleanKeyword.toLowerCase());

      let html = '';

      if (cleanKeyword && !exactExists && !selectedExists) {
        html += `
          <div
            class="tag-suggestion-item"
            data-index="0"
            onclick="selectEditTag('${escapeForJs(cleanKeyword)}')"
          >
            새 태그 추가: ${escapeHtml(cleanKeyword)}
          </div>
        `;
      }

      tags.forEach((tag, index) => {
        html += `
          <div
            class="tag-suggestion-item"
            data-index="${index + 1}"
            onclick="selectEditTag('${escapeForJs(tag)}')"
          >
            ${escapeHtml(tag)}
          </div>
        `;
      });

      if (!html) {
        html = `
          <div class="tag-suggestion-empty">
            일치하는 태그가 없습니다
          </div>
        `;
      }

      box.style.display = 'block';
      box.innerHTML = html;
    }

    function handleEditTagKeydown(event) {
      const input = document.getElementById('editTagSearchInput');
      const suggestionBox = document.getElementById('editTagSuggestions');
      const items = Array.from(suggestionBox.querySelectorAll('.tag-suggestion-item'));

      if (event.key === 'Backspace' && input.value === '' && editSelectedTags.length > 0) {
        editSelectedTags.pop();
        drawEditSelectedTags();
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();

        if (items.length) {
          const targetIndex = editActiveSuggestionIndex >= 0 ? editActiveSuggestionIndex : 0;
          const target = items[targetIndex];

          if (target) {
            const tagName = target.textContent.replace('새 태그 추가:', '').trim();
            selectEditTag(tagName);
          }
        } else if (input.value.trim()) {
          selectEditTag(input.value.trim());
        }

        return;
      }

      if (!items.length) return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        editActiveSuggestionIndex = Math.min(editActiveSuggestionIndex + 1, items.length - 1);
        updateEditActiveSuggestion(items);
        return;
      }

      if (event.key === 'ArrowUp') {
        event.preventDefault();
        editActiveSuggestionIndex = Math.max(editActiveSuggestionIndex - 1, 0);
        updateEditActiveSuggestion(items);
      }
    }

    function updateEditActiveSuggestion(items) {
      items.forEach(item => item.classList.remove('active'));

      if (items[editActiveSuggestionIndex]) {
        items[editActiveSuggestionIndex].classList.add('active');
        items[editActiveSuggestionIndex].scrollIntoView({
          block: 'nearest'
        });
      }
    }

    function selectEditTag(tag) {
      const cleanTag = String(tag || '').trim();

      if (!cleanTag) return;

      const exists = editSelectedTags.some(
        selected => selected.toLowerCase() === cleanTag.toLowerCase()
      );

      if (!exists) {
        editSelectedTags.push(cleanTag);
      }

      document.getElementById('editTagSearchInput').value = '';
      hideEditTagSuggestions();
      drawEditSelectedTags();
      focusEditTagInput();
    }

    function removeEditSelectedTag(tag) {
      editSelectedTags = editSelectedTags.filter(
        selected => selected.toLowerCase() !== String(tag).toLowerCase()
      );

      drawEditSelectedTags();
      focusEditTagInput();
    }

    function drawEditSelectedTags() {
      const area = document.getElementById('editSelectedTags');

      area.innerHTML = editSelectedTags.map(tag => `
        <span class="tag-chip">
          ${escapeHtml(tag)}
          <button type="button" onclick="event.stopPropagation(); removeEditSelectedTag('${escapeForJs(tag)}')">
            ×
          </button>
        </span>
      `).join('');
    }

    function hideEditTagSuggestions() {
      const box = document.getElementById('editTagSuggestions');

      if (!box) return;

      box.style.display = 'none';
      box.innerHTML = '';
      editActiveSuggestionIndex = -1;
    }

    function hideEditModal() {
      resetEditModalScrollPosition();
      document.getElementById('editModalBg').style.display = 'none';
      document.body.style.overflow = '';

    function saveEditForm(event) {
      event.preventDefault();

      const isCreateMode = editMode === 'create';
      const item = isCreateMode ? null : works[editingIndex];

      if (!isCreateMode && !item) return;

      const saveBtn = document.getElementById('editSaveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '저장 중...';

      const updatedWork = {
        category: editCategoryValue,
        favorite: editFavoriteValue,
        title: document.getElementById('editTitle').value.trim(),
        rating: editSelectedRating,
        grade: editGradeValue,
        tags: editSelectedTags.join(', '),

        totalCount: document.getElementById('editTotalCount').value,
        watchedCount: document.getElementById('editWatchedCount').value,

        mainCount: document.getElementById('editMainCount').value,
        mainWatchedCount: document.getElementById('editMainWatchedCount').value,

        sideCount: document.getElementById('editSideCount').value,
        sideWatchedCount: document.getElementById('editSideWatchedCount').value,

        unit: editUnitValue,
        status: document.getElementById('editStatus').value,
        review: document.getElementById('editReview').value,
        imageUrl: document.getElementById('editImageUrl').value.trim()
      };

      const beforeRowNumbers = new Set(works.map(work => String(work.rowNumber)));
      const targetRowNumber = isCreateMode ? null : item.rowNumber;

      apiPost(isCreateMode ? 'addWork' : 'updateWork', {
        rowNumber: targetRowNumber,
        work: updatedWork
      })
        .then(() => apiJsonp('getWorks'))
        .then(data => {
          works = Array.isArray(data) ? data : [];

          if (isCreateMode) {
            const newIndex = works.findIndex(work => !beforeRowNumbers.has(String(work.rowNumber)));
            selectedIndex = newIndex >= 0 ? newIndex : works.length - 1;
          } else {
            const updatedIndex = works.findIndex(work => String(work.rowNumber) === String(targetRowNumber));
            selectedIndex = updatedIndex >= 0 ? updatedIndex : null;
          }

          refreshFilterSources();
          drawFilterOptions();
          hideEditModal();
          renderWorks();

          if (!isMobileView() && selectedIndex !== null && works[selectedIndex]) {
            drawDetail(works[selectedIndex]);
          }

          saveBtn.disabled = false;
          saveBtn.textContent = '저장';
        })
        .catch(error => {
          const message =
            error && error.message
              ? error.message
              : JSON.stringify(error);

          alert(`${isCreateMode ? '새 작품 저장' : '수정 저장'} 실패\n${message}`);

          saveBtn.disabled = false;
          saveBtn.textContent = '저장';
        });
    }

    function collectAllTags(list) {
      const tagSet = new Set();

      list.forEach(item => {
        splitTags(item.tags).forEach(tag => {
          if (tag) {
            tagSet.add(tag);
          }
        });
      });

      return Array.from(tagSet).sort((a, b) => a.localeCompare(b, 'ko'));
    }

    function collectUniqueValues(list, key) {
      const set = new Set();

      list.forEach(item => {
        const value = String(item[key] || '').trim();

        if (value) {
          set.add(value);
        }
      });

      return Array.from(set).sort((a, b) => a.localeCompare(b, 'ko'));
    }

    function drawFilterOptions() {
      drawFilterButtonGroup('categoryFilterButtons', allCategories, selectedCategory, 'category');
      drawFilterButtonGroup('gradeFilterButtons', allGrades, selectedGrade, 'grade');
      drawFilterButtonGroup('statusFilterButtons', allStatuses, selectedStatus, 'status');
      drawFilterButtonGroup('readFilterButtons', ['완독', '미완독'], selectedReadStatus, 'read');
    }

    function drawFilterButtonGroup(containerId, values, selectedValue, type) {
      const container = document.getElementById(containerId);

      container.innerHTML = `
        <button
          type="button"
          class="filter-chip-btn ${!selectedValue ? 'active' : ''}"
          onclick="selectFilter('${type}', '')"
        >
          전체
        </button>

        ${values.map(value => `
          <button
            type="button"
            class="filter-chip-btn ${String(selectedValue) === String(value) ? 'active' : ''}"
            onclick="selectFilter('${type}', '${escapeForJs(value)}')"
          >
            ${escapeHtml(value)}
          </button>
        `).join('')}
      `;
    }

    function selectFilter(type, value) {
      if (type === 'category') {
        selectedCategory = value;
      }

      if (type === 'grade') {
        selectedGrade = value;
      }

      if (type === 'status') {
        selectedStatus = value;
      }

      if (type === 'read') {
        selectedReadStatus = value;
      }

      drawFilterOptions();
      renderWorks();
    }

    function getReadStatus(item) {
      if (item.readStatus) {
        return item.readStatus;
      }

      const status = String(item.status || '').trim();
      const completeStatuses = ['완결', '완결(외전)', '단행본'];

      if (!completeStatuses.includes(status)) {
        return '미완독';
      }

      const total = Number(item.totalCount || 0);
      const watched = Number(item.watchedCount || 0);

      return total > 0 && total === watched ? '완독' : '미완독';
    }

    function toggleFilterPanel(event) {
      event.stopPropagation();

      const popover = document.getElementById('filterPopover');
      const button = document.getElementById('filterBtn');

      const isOpen = popover.classList.contains('open');

      if (isOpen) {
        closeFilterPanel();
        return;
      }

      popover.classList.add('open');
      button.classList.add('active');
      positionFilterPanel(button, popover);
    }

    function closeFilterPanel() {
      const popover = document.getElementById('filterPopover');
      const button = document.getElementById('filterBtn');

      if (popover) {
        popover.classList.remove('open');
      }

      if (button) {
        button.classList.remove('active');
      }
    }

    function positionFilterPanel(button, popover) {
      const rect = button.getBoundingClientRect();
      const isMobileFilterView = window.matchMedia(
        '(max-width: 1467px), (hover: none) and (pointer: coarse), screen and (max-device-width: 1243px)'
      ).matches;

      popover.style.visibility = 'hidden';
      popover.style.display = 'block';

      if (isMobileFilterView) {
        const searchPanel = document.querySelector('.top-search');
        const panelRect = searchPanel ? searchPanel.getBoundingClientRect() : rect;
        const sideGap = 20;

        popover.style.left = `${sideGap}px`;
        popover.style.right = `${sideGap}px`;
        popover.style.top = `${panelRect.bottom + 14}px`;
        popover.style.width = `calc(100vw - ${sideGap * 2}px)`;
        popover.style.transform = 'none';

        popover.style.display = '';
        popover.style.visibility = '';
        return;
      }

      popover.style.right = '';
      popover.style.width = '';

      const popoverWidth = popover.offsetWidth;
      const margin = 12;

      let left = rect.left + rect.width / 2;
      const minLeft = popoverWidth / 2 + margin;
      const maxLeft = window.innerWidth - popoverWidth / 2 - margin;

      left = Math.max(minLeft, Math.min(maxLeft, left));

      popover.style.left = `${left}px`;
      popover.style.top = `${rect.bottom + 10}px`;
      popover.style.transform = 'translateX(-50%)';

      popover.style.display = '';
      popover.style.visibility = '';
    }

    function splitTags(value) {
      if (!value) return [];

      return String(value)
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean);
    }

    function handleTagInput() {
      const input = document.getElementById('tagSearchInput');
      const keyword = input.value.trim().toLowerCase();

      activeSuggestionIndex = -1;

      if (!keyword) {
        hideTagSuggestions();
        return;
      }

      const matchedTags = allTags.filter(tag => {
        const lowerTag = tag.toLowerCase();

        return (
          lowerTag.includes(keyword) &&
          !selectedTags.some(selected => selected.toLowerCase() === lowerTag)
        );
      });

      showTagSuggestions(matchedTags);
    }

    function showTagSuggestions(tags) {
      const box = document.getElementById('tagSuggestions');

      if (!tags.length) {
        box.style.display = 'block';
        box.innerHTML = `
          <div class="tag-suggestion-empty">
            일치하는 태그가 없습니다
          </div>
        `;
        return;
      }

      box.style.display = 'block';
      box.innerHTML = tags.map((tag, index) => `
        <div
          class="tag-suggestion-item"
          data-index="${index}"
          onclick="selectTag('${escapeForJs(tag)}')"
        >
          ${escapeHtml(tag)}
        </div>
      `).join('');
    }

    function handleTagKeydown(event) {
      const input = document.getElementById('tagSearchInput');
      const suggestionBox = document.getElementById('tagSuggestions');
      const items = Array.from(suggestionBox.querySelectorAll('.tag-suggestion-item'));

      if (event.key === 'Backspace' && input.value === '' && selectedTags.length > 0) {
        selectedTags.pop();
        drawSelectedTags();
        renderWorks();
        return;
      }

      if (!items.length) {
        if (event.key === 'Enter') {
          event.preventDefault();
        }
        return;
      }

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1);
        updateActiveSuggestion(items);
        return;
      }

      if (event.key === 'ArrowUp') {
        event.preventDefault();
        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
        updateActiveSuggestion(items);
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();

        const targetIndex = activeSuggestionIndex >= 0 ? activeSuggestionIndex : 0;
        const target = items[targetIndex];

        if (target) {
          const tagName = target.textContent.trim();
          selectTag(tagName);
        }
      }
    }

    function updateActiveSuggestion(items) {
      items.forEach(item => item.classList.remove('active'));

      if (items[activeSuggestionIndex]) {
        items[activeSuggestionIndex].classList.add('active');
        items[activeSuggestionIndex].scrollIntoView({
          block: 'nearest'
        });
      }
    }

    function selectTag(tag) {
      const cleanTag = String(tag || '').trim();

      if (!cleanTag) return;

      const exists = selectedTags.some(
        selected => selected.toLowerCase() === cleanTag.toLowerCase()
      );

      if (!exists) {
        selectedTags.push(cleanTag);
      }

      document.getElementById('tagSearchInput').value = '';
      hideTagSuggestions();
      drawSelectedTags();
      renderWorks();
      focusTagInput();
    }

    function removeSelectedTag(tag) {
      selectedTags = selectedTags.filter(
        selected => selected.toLowerCase() !== String(tag).toLowerCase()
      );

      drawSelectedTags();
      renderWorks();
      focusTagInput();
    }

    function drawSelectedTags() {
      const area = document.getElementById('selectedTags');

      area.innerHTML = selectedTags.map(tag => `
        <span class="tag-chip">
          ${escapeHtml(tag)}
          <button type="button" onclick="event.stopPropagation(); removeSelectedTag('${escapeForJs(tag)}')">
            ×
          </button>
        </span>
      `).join('');
    }

    function hideTagSuggestions() {
      const box = document.getElementById('tagSuggestions');
      box.style.display = 'none';
      box.innerHTML = '';
      activeSuggestionIndex = -1;
    }

    function focusTagInput() {
      document.getElementById('tagSearchInput').focus();
    }

    function toggleFavoriteOnly() {
      favoriteOnly = !favoriteOnly;

      const btn = document.getElementById('favoriteBtn');

      if (favoriteOnly) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      renderWorks();
    }

    function parseDate(value) {
      if (!value) return 0;
      const parsed = new Date(value);
      return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    function heartSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
        </svg>
      `;
    }

    function editSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeForJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"');
    }
  </script>

<script>
  /* 모바일 전용: 제목 검색/필터 태그 입력창 포커스 확대 방지 */
  (function () {
    function isMobileLike() {
      return document.documentElement.classList.contains('mobile-device-view') ||
        document.documentElement.classList.contains('ios-view') ||
        window.matchMedia('(max-width: 1467px), (hover: none) and (pointer: coarse), screen and (max-device-width: 1243px)').matches;
    }

    function lockViewport() {
      var viewport = document.querySelector('meta[name="viewport"]');
      if (!viewport) return;
      viewport.setAttribute(
        'content',
        'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
      );
    }

    function lockInput(input, fontSize, lineHeight) {
      if (!input || !isMobileLike()) return;
      lockViewport();
      input.style.setProperty('font-size', fontSize, 'important');
      input.style.setProperty('line-height', lineHeight, 'important');
      input.style.setProperty('transform', 'translateZ(0) scale(1)', 'important');
      input.style.setProperty('-webkit-transform', 'translateZ(0) scale(1)', 'important');
      input.style.setProperty('zoom', '1', 'important');
      input.style.setProperty('-webkit-text-size-adjust', '100%', 'important');
      input.style.setProperty('text-size-adjust', '100%', 'important');
    }

    function initMobileSearchZoomLock() {
      var titleInput = document.getElementById('titleSearchInput');
      var tagInput = document.getElementById('tagSearchInput');

      function lockTitle() {
        lockInput(titleInput, '40px', '124px');
      }

      function lockTag() {
        lockInput(tagInput, '40px', '68px');
      }

      if (titleInput) {
        ['touchstart', 'pointerdown', 'focus', 'focusin', 'input'].forEach(function (eventName) {
          titleInput.addEventListener(eventName, lockTitle, { passive: true });
        });
        lockTitle();
      }

      if (tagInput) {
        ['touchstart', 'pointerdown', 'focus', 'focusin', 'input'].forEach(function (eventName) {
          tagInput.addEventListener(eventName, lockTag, { passive: true });
        });
        lockTag();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMobileSearchZoomLock);
    } else {
      initMobileSearchZoomLock();
    }
  })();
</script>
